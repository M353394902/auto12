name: Build EXE (Win7 Compatible)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.7
      uses: actions/setup-python@v5
      with:
        python-version: "3.7"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller==4.10

    - name: Build EXE
      run: |
        pyinstaller gui_bot.py --onefile --windowed --icon=myicon.ico --name "auto bot"

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: auto-bot-exe
        path: dist/auto bot.exe
